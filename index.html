<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankur - The Learning Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka&family=Outfit&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
}

/* ===== BACKGROUND SLIDER ===== */
.bg-slider {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.bg-slider img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.bg-slider img.active {
    opacity: 1;
}

/* ===== NAVBAR ===== */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 60px;
    width: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ffd700;
}

.logo-text {
    font-family: 'Fredoka';
    font-size: 26px;
    color: #5f27cd;
    font-weight: bold;
}

.nav-links {
    display: flex;
    gap: 15px;
}

.nav-btn {
    padding: 8px 20px;
    border-radius: 30px;
    background: #5f27cd;
    color: white;
    text-decoration: none;
    font-weight: 600;
}

.nav-btn:hover {
    background: #341f97;
}

.active {
    background: #341f97;
}

/* ===== HERO ===== */
.hero {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
}

.hero-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    width: 300px;
    padding: 20px 15px;
    border-radius: 25px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.center-logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
    border: 5px solid #ffd700;
    box-shadow: 0 0 20px rgba(255,215,0,0.7);
}

h1 {
    font-family: 'Fredoka';
    color: #5f27cd;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 2px 4px 10px rgba(0,0,0,0.2);
    margin: 5px 0;
}

.hero-card p {
    margin: 3px 0;
}

.admission-btn {
    display: inline-block;
    margin: 10px 0;
    padding: 10px 25px;
    background: linear-gradient(135deg, #ff9f43, #ff7a18);
    color: white;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 600;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* ===== FLOAT BUTTON ===== */
.enquire-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #ff4757;
    color: white;
    padding: 15px 25px;
    border-radius: 40px;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- BACKGROUND SLIDER -->
<div class="bg-slider">
    <img src="p1.jpeg" class="active">
    <img src="p2.jpeg">
    <img src="p3.jpeg">
</div>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        <img src="logo.png">
        <span class="logo-text">ANKUR</span>
    </div>

    <div class="nav-links">
        <a href="index.html" class="nav-btn active">Home</a>
        <a href="about.html" class="nav-btn">About</a>
        <a href="vision.html" class="nav-btn">Vision</a>
        <a href="contact.html" class="nav-btn">Contact</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-card">

        <img src="logo.png" class="center-logo">

        <h1>ANKUR</h1>
        <p><b>THE LEARNING HUB</b></p>

        <a href="admision.html" class="admission-btn">
            ADMISSIONS OPEN 2026–27
        </a>

        <p>
    <span style="color:#ff4081;">Joyful ,</span> 
    <span style="color:#ff69b4;">Stress-free &</span> 
    <span style="color:#ff1493;">Meaningful Learning</span>
</p>

    </div>
</div>

<!-- FLOAT BUTTON -->
<a href="tel:9082137372" class="enquire-btn">ENQUIRE NOW</a>

<!-- SLIDER SCRIPT -->
<script>
let slides = document.querySelectorAll('.bg-slider img');
let index = 0;

setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 3000);
</script>

</body>
</html>
